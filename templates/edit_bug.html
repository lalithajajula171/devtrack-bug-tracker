<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Bug - DevTrack</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-warning text-dark">
            <h3 class="text-center">✏️ Edit Bug</h3>
        </div>

        <div class="card-body">

            <form action="/updatebug/{{ bug[0] }}" method="POST">

                <div class="mb-3">
                    <label class="form-label">Bug Title</label>
                    <input
                        type="text"
                        name="title"
                        class="form-control"
                        value="{{ bug[1] }}"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea
                        name="description"
                        class="form-control"
                        rows="5"
                        required>{{ bug[2] }}</textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Priority</label>
                    <select name="priority" class="form-select">

                        <option value="Low" {% if bug[3]=='Low' %}selected{% endif %}>Low</option>
                        <option value="Medium" {% if bug[3]=='Medium' %}selected{% endif %}>Medium</option>
                        <option value="High" {% if bug[3]=='High' %}selected{% endif %}>High</option>
                        <option value="Critical" {% if bug[3]=='Critical' %}selected{% endif %}>Critical</option>

                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Status</label>
                    <select name="status" class="form-select">

                        <option value="Open" {% if bug[4]=='Open' %}selected{% endif %}>Open</option>
                        <option value="In Progress" {% if bug[4]=='In Progress' %}selected{% endif %}>In Progress</option>
                        <option value="Closed" {% if bug[4]=='Closed' %}selected{% endif %}>Closed</option>

                    </select>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-warning">
                        💾 Update Bug
                    </button>
                </div>

            </form>

            <div class="text-center mt-3">
                <a href="/viewbugs" class="btn btn-secondary">
                    ⬅ Back to Bug List
                </a>
            </div>

        </div>

    </div>

</div>

</body>
</html>
